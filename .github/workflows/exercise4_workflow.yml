name: Workflow of exercise 4
run-name: Fourth workflow

# Events triggering the workflow
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  style-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.14]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip and install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Check code style
        run: python -m black mycode.py

  test:
    runs-on: ${{ matrix.os }}
    needs: style-check
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: [3.12, 3.13, 3.14]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip and install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest test_mycode.py

  lint:
    runs-on: ubuntu-latest
    needs: [style-check, test]  # Ensure lint runs after both jobs
    if: success()  # This condition ensures lint runs only if previous jobs succeed
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install actionlint
        run: |
          curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/master/install.sh | sh

      - name: Run actionlint
        run: ./actionlint
